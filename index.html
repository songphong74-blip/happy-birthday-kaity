<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Happy Birthday Chị Kaity ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

background:linear-gradient(135deg,#ffd9e8,#fff5f9);

overflow:hidden;

height:100vh;

}

/* ===================== */

#intro{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#ffc5d9,#ffe9f2);

z-index:100;

}

.envelope{

width:340px;

height:230px;

position:relative;

cursor:pointer;

transition:1s;

}

.back{

position:absolute;

width:100%;

height:100%;

background:#ff77aa;

border-radius:12px;

}

.flap{

position:absolute;

width:100%;

height:100%;

background:#ff5b99;

clip-path:polygon(0 0,100% 0,50% 58%);

transform-origin:top;

transition:1s;

z-index:5;

}

.paper{

position:absolute;

width:92%;

height:92%;

left:4%;

top:4%;

background:white;

border-radius:10px;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

transition:1s;

box-shadow:0 10px 25px rgba(0,0,0,.15);

}

.paper h1{

font-size:55px;

}

.paper h2{

color:#ff4d88;

margin:15px 0;

}

.paper button{

padding:14px 30px;

border:none;

background:#ff4d88;

color:white;

border-radius:30px;

font-size:18px;

cursor:pointer;

}

.open .flap{

transform:rotateX(180deg);

}

.open .paper{

transform:translateY(-140px);

}

/* ===================== */

#main{

display:none;

position:absolute;

left:0;

top:0;

width:100%;

height:100%;

overflow:auto;

padding:40px;

text-align:center;

}

.title{

font-size:52px;

color:#ff3d86;

margin-bottom:25px;

animation:pulse 2s infinite;

}

.slider{

width:90%;

max-width:760px;

height:480px;

margin:auto;

position:relative;

border-radius:25px;

overflow:hidden;

background:white;

box-shadow:0 20px 45px rgba(0,0,0,.15);

}

.slide{

position:absolute;

left:0;

top:0;

width:100%;

height:100%;

opacity:0;

transition:1s;

display:flex;

justify-content:center;

align-items:center;

background:white;

}

.slide.active{

opacity:1;

}

.slide img{

max-width:100%;

max-height:100%;

object-fit:contain;

}
    .message{

width:90%;

max-width:850px;

margin:40px auto;

background:white;

padding:35px;

border-radius:25px;

box-shadow:0 15px 35px rgba(0,0,0,.12);

}

.message h2{

color:#ff4d88;

margin-bottom:20px;

}

.message p{

font-size:22px;

line-height:1.8;

color:#555;

min-height:220px;

white-space:pre-line;

}

.cake{

font-size:120px;

margin-top:20px;

animation:float 2s infinite;

}

#fireBtn{

margin-top:20px;

padding:15px 35px;

border:none;

border-radius:40px;

background:#ff4d88;

color:white;

font-size:20px;

cursor:pointer;

}

/* ---------- Hearts ---------- */

.hearts{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

pointer-events:none;

overflow:hidden;

}

.heart{

position:absolute;

bottom:-40px;

animation:heartUp linear forwards;

}

/* ---------- Flowers ---------- */

.flowers{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

pointer-events:none;

overflow:hidden;

}

.flower{

position:absolute;

top:-50px;

animation:flowerDown linear forwards;

}

/* ---------- Fireworks ---------- */

#fireworks{

position:fixed;

left:0;

top:0;

width:100%;

height:100%;

pointer-events:none;

overflow:hidden;

}

.spark{

position:absolute;

width:10px;

height:10px;

border-radius:50%;

animation:spark 1s forwards;

}

@keyframes pulse{

50%{

transform:scale(1.05);

}

}

@keyframes float{

50%{

transform:translateY(-15px);

}

}

@keyframes heartUp{

to{

transform:translateY(-120vh);

opacity:0;

}

}

@keyframes flowerDown{

to{

transform:translateY(120vh) rotate(360deg);

opacity:0;

}

}

@keyframes spark{

to{

transform:translate(var(--x),var(--y));

opacity:0;

}

}

@media(max-width:768px){

.title{

font-size:34px;

}

.slider{

height:320px;

}

.message p{

font-size:18px;

}

}

</style>

</head>

<body>

<div class="hearts"></div>

<div class="flowers"></div>

<div id="intro">

<div class="envelope" id="envelope">

<div class="back"></div>

<div class="flap"></div>

<div class="paper">

<h1>💌</h1>

<h2>Happy Birthday</h2>

<h3>Chị Kaity</h3>

<button id="openBtn">MỞ THIỆP</button>

</div>

</div>

</div>

<div id="main">

<h1 class="title">

🎂 Happy Birthday Chị Kaity 🎂

</h1>

<div class="slider">

<div class="slide active"><img src="photo1.jpg"></div>

<div class="slide"><img src="photo2.jpg"></div>

<div class="slide"><img src="photo3.jpg"></div>

<div class="slide"><img src="photo4.jpg"></div>

<div class="slide"><img src="photo5.jpg"></div>

</div>

<div class="message">

<h2>💖 Gửi chị Kaity</h2>

<p id="typing"></p>

</div>

<div class="cake">🎂</div>

<button id="fireBtn">

🎆 Chúc mừng sinh nhật 🎆

</button>

</div>

<div id="fireworks"></div>

<audio id="music" loop>

<source src="music.mp3" type="audio/mpeg">

</audio>

<script>
    const intro=document.getElementById("intro");
const main=document.getElementById("main");
const envelope=document.getElementById("envelope");
const openBtn=document.getElementById("openBtn");
const music=document.getElementById("music");

const text=`Happy Birthday Chị Kaity 🎂💖

Chúc chị Kaity có một tuổi mới thật nhiều sức khỏe, niềm vui và hạnh phúc.

Mong mọi điều tốt đẹp sẽ luôn đồng hành cùng chị, công việc thuận lợi, cuộc sống luôn ngập tràn tiếng cười và những khoảnh khắc đáng nhớ.

Cảm ơn chị vì luôn mang đến sự ấm áp và yêu thương cho mọi người.

Chúc chị luôn xinh đẹp, rạng rỡ, giữ mãi nụ cười tươi và có thật nhiều điều may mắn trong tuổi mới.

❤️ Chúc mừng sinh nhật chị ❤️`;

openBtn.onclick=function(){

envelope.classList.add("open");

setTimeout(function(){

intro.style.display="none";

main.style.display="block";

music.play().catch(()=>{});

typing();

slideShow();

setInterval(createHeart,350);

setInterval(createFlower,800);

fireworks();

},1200);

}

function typing(){

let i=0;

const box=document.getElementById("typing");

const timer=setInterval(function(){

box.innerHTML+=text.charAt(i);

i++;

if(i>=text.length){

clearInterval(timer);

}

},35);

}

let current=0;

function slideShow(){

const slide=document.querySelectorAll(".slide");

setInterval(function(){

slide[current].classList.remove("active");

current++;

if(current>=slide.length){

current=0;

}

slide[current].classList.add("active");

},4000);

}

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(18+Math.random()*25)+"px";

heart.style.animationDuration=(4+Math.random()*4)+"s";

document.querySelector(".hearts").appendChild(heart);

setTimeout(function(){

heart.remove();

},8000);

}

function createFlower(){

const flower=document.createElement("div");

flower.className="flower";

flower.innerHTML="🌸";

flower.style.left=Math.random()*100+"vw";

flower.style.fontSize=(18+Math.random()*18)+"px";

flower.style.animationDuration=(5+Math.random()*5)+"s";

document.querySelector(".flowers").appendChild(flower);

setTimeout(function(){

flower.remove();

},10000);

}
    function fireworks(){

const box=document.getElementById("fireworks");

for(let k=0;k<10;k++){

setTimeout(()=>explode(),k*400);

}

function explode(){

const x=Math.random()*window.innerWidth;

const y=Math.random()*window.innerHeight*0.6;

for(let i=0;i<30;i++){

const s=document.createElement("div");

s.className="spark";

s.style.left=x+"px";

s.style.top=y+"px";

s.style.background=`hsl(${Math.random()*360},100%,60%)`;

const angle=Math.random()*Math.PI*2;

const distance=50+Math.random()*80;

s.style.setProperty("--x",Math.cos(angle)*distance+"px");

s.style.setProperty("--y",Math.sin(angle)*distance+"px");

box.appendChild(s);

setTimeout(()=>{

s.remove();

},1000);

}

}

}

document.getElementById("fireBtn").onclick=function(){

fireworks();

};

</script>

</body>

</html>
